name: Build & Deploy to Vercel

on:
  push:
    branches: [main]

env:
  FLUTTER_VERSION: "3.35.3"
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true # حل مشكلة تحذير الـ Node.js

jobs:
  build-and-deploy:
    runs-on: ubuntu-latest
    steps:
      - name: 📦 Checkout repository
        uses: actions/checkout@v4

      - name: 🐦 Setup Flutter
        uses: subosito/flutter-action@v2
        with:
          flutter-version: ${{ env.FLUTTER_VERSION }}
          channel: stable
          cache: true

      - name: 📥 Install dependencies
        run: flutter pub get

      - name: 🔨 Build Flutter Web
        run: |
          flutter build web --release \
            --dart-define=SUPABASE_URL=${{ secrets.SUPABASE_URL }} \
            --dart-define=SUPABASE_ANON_KEY=${{ secrets.SUPABASE_ANON_KEY }}

      - name: 🔧 Install Vercel CLI
        run: npm install -g vercel@latest

      # الخطوة دي بتجيب إعدادات مشروعك من فيرسيل عشان الرفع يروح للمكان الصح
      - name: 🔗 Pull Vercel Project Info
        run: vercel pull --yes --environment=production --token=${{ secrets.VERCEL_TOKEN }}

      # الرفع النهائي مع التأكيد إنه Production
      - name: 🚀 Deploy to Vercel Production
        run: vercel deploy build/web --prod --yes --token=${{ secrets.VERCEL_TOKEN }}