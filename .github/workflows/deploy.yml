name: Build & Deploy to Vercel

on:
  push:
    branches: [main]

env:
  FLUTTER_VERSION: "3.35.3"

jobs:
  build-and-deploy:
    runs-on: ubuntu-latest
    steps:
      - name: 📦 Checkout repository
        uses: actions/checkout@v4

      # تحديد نسخة Node.js 24 لضمان توافق الـ Vercel CLI
      - name: 🟢 Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 24

      - name: 🔗 Link Vercel Project
        run: |
          mkdir -p .vercel
          echo '{"projectId":"prj_dDwATAOXwcnKLc7nh0wVRIqDjqjV","orgId":"team_BebZFuNyzDuhF2J1GCL41Ahe"}' > .vercel/project.json

      - name: 📂 Copy local public build to build/web
        run: |
          mkdir -p build/web
          cp -R public/* build/web/

      - name: 🔧 Install Vercel CLI
        run: npm install -g vercel@latest

      - name: 🔗 Pull Vercel Project Info
        run: vercel pull --yes --environment=production --token=${{ secrets.VERCEL_TOKEN }}

      - name: 🏗️ Build Vercel Project
        run: vercel build --prod --token=${{ secrets.VERCEL_TOKEN }}

      - name: 🚀 Deploy to Vercel Production
        run: vercel deploy --prebuilt --prod --yes --token=${{ secrets.VERCEL_TOKEN }}
