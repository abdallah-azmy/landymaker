<!DOCTYPE html>
<html>
<head>
  <meta charset="utf-8">
  <title>Authenticating...</title>
  <style>
    body {
      font-family: 'Cairo', -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, sans-serif;
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      height: 100vh;
      margin: 0;
      background-color: #030712;
      color: #f3f4f6;
    }
    .spinner {
      border: 4px solid rgba(255, 255, 255, 0.1);
      width: 48px;
      height: 48px;
      border-radius: 50%;
      border-left-color: #00E5FF;
      animation: spin 1s linear infinite;
      margin-bottom: 20px;
    }
    @keyframes spin {
      0% { transform: rotate(0deg); }
      100% { transform: rotate(360deg); }
    }
    h2 {
      font-weight: 600;
      margin: 0;
    }
  </style>
</head>
<body>
  <div class="spinner"></div>
  <h2>جاري تسجيل الدخول...</h2>

  <script>
    (function() {
      // 1. Check for authorization code in query string (PKCE flow)
      const urlParams = new URLSearchParams(window.location.search);
      const code = urlParams.get('code');
      const error = urlParams.get('error') || urlParams.get('error_description');

      // 2. Check for access token in hash fragment (Implicit flow fallback)
      const hash = window.location.hash;

      if (code) {
        if (window.opener) {
          window.opener.postMessage({ type: 'supabase_auth_code', code: code }, window.location.origin);
        }
      } else if (hash && hash.includes('access_token')) {
        const params = new URLSearchParams(hash.substring(1));
        const accessToken = params.get('access_token');
        const refreshToken = params.get('refresh_token');
        const expiresAt = params.get('expires_at');
        if (window.opener) {
          window.opener.postMessage({
            type: 'supabase_auth_implicit',
            accessToken: accessToken,
            refreshToken: refreshToken,
            expiresAt: expiresAt
          }, window.location.origin);
        }
      } else if (error) {
        if (window.opener) {
          window.opener.postMessage({ type: 'supabase_auth_error', error: error }, window.location.origin);
        }
      }

      // Close the popup after sending the message
      setTimeout(function() {
        window.close();
      }, 500);
    })();
  </script>
</body>
</html>
