  <!-- Inline styles for the fallback loading indicator and Google verification links -->
  <style>
    #loading-indicator {
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      position: fixed;
      top: 0;
      left: 0;
      width: 100vw;
      height: 100vh;
      background-color: #030712; /* Dark Slate Black matching AppColors.darkBackground */
      z-index: 99999;
      font-family: 'Cairo', 'Tajawal', sans-serif;
      transition: opacity 0.1s ease-out;
    }
    
    .loading-logo {
      width: 80px;
      height: 80px;
      margin-bottom: 24px;
      object-fit: contain;
      border-radius: 50%;
      animation: logo-shimmer 2s ease-in-out infinite;
    }

    @keyframes logo-shimmer {
      0%, 100% {
        filter: brightness(1) drop-shadow(0 0 4px rgba(0, 229, 255, 0.2));
        transform: scale(1);
      }
      50% {
        filter: brightness(1.15) drop-shadow(0 0 12px rgba(0, 229, 255, 0.5));
        transform: scale(1.03);
      }
    }

    /* Visually hidden but fully crawlable for search engine bots and Google verification crawlers */
    .sr-only {
      position: absolute;
      width: 1px;
      height: 1px;
      padding: 0;
      margin: -1px;
      overflow: hidden;
      clip: rect(0, 0, 0, 0);
      white-space: nowrap;
      border: 0;
    }
  </style>
</head>
<body>
  <!-- Visually hidden links for crawlers and Google OAuth Verification bots only (permanent in DOM) -->
  <div class="sr-only">
    <a href="https://landymaker.com/privacy-policy">سياسة الخصوصية / Privacy Policy</a>
    <a href="https://landymaker.com/terms">شروط الخدمة / Terms of Service</a>
  </div>

  <!-- Fallback/SEO loader -->
  <div id="loading-indicator">
    <img class="loading-logo" src="assets/assets/images/logo_small.webp" onerror="this.src='logo_social.webp'" alt="LandyMaker">
  </div>

  <script>
    // Remove the loading screen once Flutter renders the first frame
    function removeLoader() {
      var loading = document.getElementById('loading-indicator');
      if (loading) {
        loading.style.opacity = '0';
        setTimeout(function() {
          if (loading.parentNode) {
            loading.parentNode.removeChild(loading);
          }
        }, 100);
      }
    }
    window.addEventListener('flutter-first-frame', removeLoader);
    
    // Safety fallback: auto-remove loader after 12 seconds if Flutter takes too long or fails to load
    setTimeout(removeLoader, 12000);
  </script>

  <!-- Google Tag Manager (noscript) -->
  <noscript><iframe src="https://www.googletagmanager.com/ns.html?id=GTM-XXXXXXX"
  height="0" width="0" style="display:none;visibility:hidden"></iframe></noscript>
  <!-- End Google Tag Manager (noscript) -->

  <!-- PWA Install Prompt Handler -->
  <script>
    window.landyPwaDeferredPrompt = null;
    window.landyPwaIsInstallAvailable = false;

    window.addEventListener('beforeinstallprompt', (e) => {
      e.preventDefault();
      window.landyPwaDeferredPrompt = e;
      window.landyPwaIsInstallAvailable = true;
      console.log('[PWA] Install prompt available');
    });

    window.addEventListener('appinstalled', () => {
      window.landyPwaDeferredPrompt = null;
      window.landyPwaIsInstallAvailable = false;
      console.log('[PWA] App installed');
    });

    window.landyPwaInstall = function() {
      const prompt = window.landyPwaDeferredPrompt;
      if (prompt) {
        prompt.prompt();
        window.landyPwaDeferredPrompt = null;
        window.landyPwaIsInstallAvailable = false;
        prompt.userChoice.then((choiceResult) => {
          console.log('[PWA] User choice:', choiceResult.outcome);
        });
      }
    };
  </script>

  <!-- PWA Service Worker Registration -->
  <script>
    if ('serviceWorker' in navigator) {
      window.addEventListener('load', () => {
        navigator.serviceWorker.register('/service-worker.js').then((reg) => {
          console.log('[PWA] Service Worker registered');
        }).catch((err) => {
          console.warn('[PWA] Service Worker registration failed:', err);
        });
      });
    }
  </script>
