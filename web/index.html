  <style>
    #loading-indicator {
      display: flex;
      align-items: center;
      justify-content: center;
      position: fixed;
      top: 0;
      left: 0;
      width: 100vw;
      height: 100vh;
      background-color: #060A12;
      /* Matches AppColors.darkBackground exactly */
      z-index: 99999;
      font-family: 'Cairo', sans-serif;
      will-change: opacity;
      transition: background-color 0.4s ease;
    }

    .loading-logo,
    .logo-persistent {
      width: 90px;
      height: 90px;
      object-fit: contain;
      position: relative;
      z-index: 2;
      transform: scale(1.0) translateZ(0);
      filter: brightness(0.6) drop-shadow(0 0 0px rgba(0, 229, 255, 0));
      will-change: transform, filter, opacity;
      animation: logo-ramp 3.8s ease-out forwards;
    }

    @keyframes logo-ramp {
      0% {
        transform: scale(1) translateZ(0);
        filter: brightness(0.6) drop-shadow(0 0 0px rgba(0, 229, 255, 0));
      }
      100% {
        transform: scale(1.25) translateZ(0);
        filter: brightness(1.45) drop-shadow(0 0 25px rgba(0, 229, 255, 0.75));
      }
    }

    /* When the loader is in persistent-logo mode, clicks pass through to Flutter */
    #loading-indicator.persistent-mode {
      pointer-events: none;
    }

    /* Gathering cubes: small isometric SVG cubes that converge toward the logo
       while Flutter is booting, creating a seamless transition to the 3D cube gathering.
       Pure CSS animation (translate + rotate) — GPU composited, zero overhead. */
    #gathering-squares {
      position: absolute;
      inset: 0;
      pointer-events: none;
      z-index: 1;
    }

    .gathering-cube {
      position: absolute;
      left: calc(50% - 8px);
      top: calc(50% - 8px);
      width: 16px;
      height: 16px;
      opacity: 0;
      animation-name: gather-loop;
      animation-duration: 8s;
      animation-timing-function: cubic-bezier(0.22, 1, 0.36, 1);
      animation-iteration-count: 1;
      /* Only run once, cleaned up via JS on completion */
      animation-delay: var(--delay, 0s);
      will-change: transform, opacity;
    }

    /* Flying gather animation:
       - 0%:  invisible at edge position
       - 15%: fully visible, flying toward its target point
       - 90%: almost at target, begins to fade out
       - 100%: arrives at target (behind logo), becomes completely transparent
       This makes the cube disappear immediately once it reaches the logo. */
    @keyframes gather-loop {
      0% {
        opacity: 0;
        transform: translate(calc(var(--sx) * 1px), calc(var(--sy) * 1px)) rotateZ(calc(var(--rz) * 1deg)) scale(0.3);
      }

      15% {
        opacity: 1;
      }

      90% {
        opacity: 1;
      }

      100% {
        opacity: 0;
        transform: translate(calc(var(--tx) * 1px), calc(var(--ty) * 1px)) rotateZ(0deg) scale(0.7);
      }
    }

    /* Visually hidden but fully crawlable for search engine bots and Google verification crawlers */
    .sr-only {
      position: absolute;
      width: 1px;
      height: 1px;
      padding: 0;
      margin: -1px;
      overflow: hidden;
      clip: rect(0, 0, 0, 0);
      white-space: nowrap;
      border: 0;
    }

  <script>
    // Define reserved paths matching TenantRoutingService.reservedPaths
    var reservedPaths = new Set([
      '',
      'blog',
      '_next',
      'login',
      'register',
      'signup',
      'signin',
      'forgot-password',
      'reset-password',
      'dashboard',
      'admin',
      'settings',
      'profile',
      'pricing',
      'plans',
      'billing',
      'checkout',
      'success',
      'cancel',
      'api',
      'auth',
      'app',
      'editor',
      'builder',
      'pages',
      'page',
      'store',
      'products',
      'orders',
      'analytics',
      'support',
      'help',
      'about',
      'contact',
      'privacy',
      'privacy-policy',
      'terms',
      'templates',
      'guest-preview',
      'sitemap',
      'robots.txt',
      'favicon.ico',
      'home',
      'public_viewer',
      'assets',
      'images',
      'icons',
      'web'
    ]);

    function isPublicLandingPage() {
      var host = window.location.hostname.toLowerCase();
      var path = window.location.pathname;
      var pathSegments = path.split('/').filter(Boolean);

      var isCoreDomain = host === 'localhost' ||
        host === '127.0.0.1' ||
        host === 'landymaker.com' ||
        host === 'landymaker.vercel.app' ||
        host.indexOf('dashboard.') === 0 ||
        host.indexOf('app.') === 0;

      if (isCoreDomain) {
        if (pathSegments.length > 0) {
          var firstSegment = pathSegments[0].trim();
          if (firstSegment && !reservedPaths.has(firstSegment)) {
            return true;
          }
        }
        if (host === 'localhost' || host === '127.0.0.1') {
          var urlParams = new URLSearchParams(window.location.search);
          if (urlParams.get('tenant') || urlParams.get('subdomain')) {
            return true;
          }
        }
        return false;
      }
      return true;
    }

    // ── SVG isometric cubes ──────────────────────────────────────────────
    // 27 small 3D cubes (SVG) fly in from screen EDGES toward the logo,
    // creating a dramatic gathering effect that matches the Flutter cube
    // particle system aesthetic.
    // Each cube starts at a random edge position with its own delay and rotation.
    // Cubes DISAPPEAR behind the logo (z-index: 1 vs logo z-index: 2), so they
    // look like they're being absorbed into the logo. Each arrival increases
    // the logo's glow — with density increasing over time as more cubes spawn.
    //
    // IMPORTANT: Edge positions are also stored in window._htmlCubeEdgePositions
    // so Flutter can read them and launch its cubes from the SAME positions,
    // creating a seamless visual continuation — as if the HTML cubes fly behind
    // the logo and emerge as Flutter cubes on the other side.
    var _gatheringContainer = document.getElementById('gathering-squares');
    var _glowStartTime = performance.now();
    var _glowArrivals = 0;
    var _glowMaxArrivals = 300;
    var _ns = 'http://www.w3.org/2000/svg';
    var _viewW = window.innerWidth;
    var _viewH = window.innerHeight;
    var _glowActive = false;

    // Pre-generate 81 edge positions (for 27 bricks × 3 cubes each) and store
    // them globally so Flutter can reuse them for perfect direction continuity.
    window._htmlCubeEdgePositions = [];

    var _gatheringContainer = document.getElementById('gathering-squares');
    var _viewW = window.innerWidth;
    var _viewH = window.innerHeight;
    var _htmlCubesSpawning = true;

    function getEdgePosition() {
      var side = Math.floor(Math.random() * 4);
      var pos;
      switch (side) {
        case 0: pos = { x: (Math.random() - 0.5) * _viewW * 1.2, y: -_viewH * (0.3 + Math.random() * 0.5) }; break;
        case 1: pos = { x: (Math.random() - 0.5) * _viewW * 1.2, y: _viewH * (0.3 + Math.random() * 0.5) }; break;
        case 2: pos = { x: -_viewW * (0.3 + Math.random() * 0.5), y: (Math.random() - 0.5) * _viewH * 1.2 }; break;
        default: pos = { x: _viewW * (0.3 + Math.random() * 0.5), y: (Math.random() - 0.5) * _viewH * 1.2 };
      }
      return { x: pos.x / _viewW, y: pos.y / _viewH };
    }

    function createGatheringSquares() {
      if (!_gatheringContainer) return;
      var allPositions = [];
      for (var i = 0; i < 81; i++) {
        allPositions.push(getEdgePosition());
      }
      window._htmlCubeEdgePositions = JSON.stringify(allPositions);

      var positionIndex = 0;
      var startTime = performance.now();

      function spawnLoop() {
        if (!_htmlCubesSpawning) return;

        var pos = positionIndex < 81 ? allPositions[positionIndex++] : getEdgePosition();

        var wrapper = document.createElement('div');
        wrapper.className = 'gathering-cube';

        // Use SVG for crispness, identical to Flutter cubes
        wrapper.innerHTML = '<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 16 16" width="16" height="16"><polygon points="8,2 14,5 8,8 2,5" fill="#0ff" opacity="0.92"/><polygon points="8,8 2,5 2,11 8,14" fill="#00c8ff" opacity="0.82"/><polygon points="8,8 14,5 14,11 8,14" fill="#0088cc" opacity="0.72"/><polygon points="8,2 14,5 8,8 2,5" fill="none" stroke="#66f0ff" stroke-width="0.5" opacity="0.7"/></svg>';

        // Random starting distance from edges
        var startX = pos.x * _viewW;
        var startY = pos.y * _viewH;

        // Slight random offset from center for organic gathering
        var endX = (Math.random() - 0.5) * 70;
        var endY = (Math.random() - 0.5) * 70;

        wrapper.style.setProperty('--sx', String(startX));
        wrapper.style.setProperty('--sy', String(startY));
        wrapper.style.setProperty('--tx', String(endX));
        wrapper.style.setProperty('--ty', String(endY));
        wrapper.style.setProperty('--rz', String((Math.random() - 0.5) * 360));

        var duration = 0.8 + Math.random() * 0.5;
        wrapper.style.animationDuration = String(duration) + 's';

        _gatheringContainer.appendChild(wrapper);

        // Remove element exactly when animation completes
        setTimeout(function () {
          if (wrapper.parentNode) {
            wrapper.parentNode.removeChild(wrapper);
          }
        }, duration * 1000);

        var elapsed = performance.now() - startTime;
        var progress = Math.min(elapsed / 3500, 1.0);
        var spawnInterval = (400 - (320 * progress * progress)) / 3;

        setTimeout(spawnLoop, spawnInterval);
      }

      spawnLoop();
    }
    createGatheringSquares();

    function stopHtmlSpawning() {
      _htmlCubesSpawning = false;
      // Do NOT clear canvas or innerHTML instantly. Let existing cubes finish their animation gracefully!
    }

    function removeLoader() {
      stopHtmlSpawning();
      var loading = document.getElementById('loading-indicator');
      if (loading) {
        loading.style.transition = 'opacity 0.25s ease';
        loading.style.opacity = '0';
        setTimeout(function () {
          if (loading.parentNode) {
            loading.parentNode.removeChild(loading);
          }
        }, 280);
      }
    }

    // Transition the loader to a persistent logo state:
    // — background becomes transparent (page content visible behind it)
    // — logo continues its slow glow ramp-up (same animation, no class swap)
    // — clicks pass through to the Flutter app
    // — gathering squares KEEP looping (they don't fade out — Flutter cubes
    //   build behind them, creating a seamless visual continuation)
    function transitionToPersistentLogo() {
      stopHtmlSpawning();
      var loading = document.getElementById('loading-indicator');
      if (!loading) return;
      loading.classList.add('persistent-mode');
      // Use inline style for smooth CSS transition (the base #loading-indicator has transition: background-color)
      loading.style.backgroundColor = 'transparent';
      // Logo keeps its original class — the animation continues naturally without restarting
      // (.loading-logo and .logo-persistent share the same logo-ramp animation now)
      // Gathering squares stay visible — they keep looping continuously
    }

    // Remove the persistent logo with a SLOW fade-out (1500ms).
    // As the logo fades, Flutter cubes are simultaneously building the
    // 3×3×3 cube behind it — the slow overlap makes it look like the
    // logo is turning into the real Flutter cube.
    // Fading the #loading-indicator automatically fades all children
    // (logo image + gathering squares) together as one layer.
    function removePersistentLogo() {
      stopHtmlSpawning();
      var loading = document.getElementById('loading-indicator');
      if (!loading) return;
      loading.style.transition = 'opacity 1.5s ease';
      loading.style.opacity = '0';
      setTimeout(function () {
        if (loading && loading.parentNode) {
          loading.parentNode.removeChild(loading);
        }
      }, 1550);
    }

    function setLogoOpacity(value) {
      var logo = document.querySelector('.loading-logo, .logo-persistent');
      if (logo) {
        logo.style.opacity = String(value);
      }
    }

    // Register first frame listener only if it is NOT a public page.
    // For public pages, Dart will call window.removeLandyMakerLoader() directly when ready.
    if (!isPublicLandingPage()) {
      window.addEventListener('flutter-first-frame', transitionToPersistentLogo);
    }

    // Expose globally so Dart can call them
    window.removeLandyMakerLoader = removeLoader;
    window.transitionToPersistentLogo = transitionToPersistentLogo;
    window.removePersistentLogo = removePersistentLogo;
    window.setLogoOpacity = setLogoOpacity;

    // Safety fallback: auto-remove loader after 12 seconds if Flutter takes too long or fails to load
    setTimeout(removeLoader, 12000);
  </script>

  <!-- PWA Install Prompt Handler -->
  <script>
    window.landyPwaDeferredPrompt = null;
    window.landyPwaIsInstallAvailable = false;

    window.addEventListener('beforeinstallprompt', (e) => {
      e.preventDefault();
      window.landyPwaDeferredPrompt = e;
      window.landyPwaIsInstallAvailable = true;
      console.log('[PWA] Install prompt available');
    });

    window.addEventListener('appinstalled', () => {
      window.landyPwaDeferredPrompt = null;
      window.landyPwaIsInstallAvailable = false;
      console.log('[PWA] App installed');
    });

    window.landyPwaInstall = function () {
      const prompt = window.landyPwaDeferredPrompt;
      if (prompt) {
        prompt.prompt();
        window.landyPwaDeferredPrompt = null;
        window.landyPwaIsInstallAvailable = false;
        prompt.userChoice.then((choiceResult) => {
          console.log('[PWA] User choice:', choiceResult.outcome);
        });
      }
    };
  </script>

  <!-- PWA Service Worker Registration -->
  <script>
    if ('serviceWorker' in navigator) {
      if (window.location.hostname === 'localhost' || window.location.hostname === '127.0.0.1') {
        // Automatically unregister service worker on localhost to avoid caching issues during development
        navigator.serviceWorker.getRegistrations().then((registrations) => {
          for (let registration of registrations) {
            registration.unregister().then((success) => {
              if (success) {
                console.log('[PWA] Unregistered service worker on localhost to prevent debugging cache issues');
              }
            });
          }
        });
      } else {
        window.addEventListener('load', () => {
          navigator.serviceWorker.register('/service-worker.js').then((reg) => {
            console.log('[PWA] Service Worker registered');
          }).catch((err) => {
            console.warn('[PWA] Service Worker registration failed:', err);
          });
        });
      }
    }
  </script>
